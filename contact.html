<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Gyan Shala Smart Education Platform</title>
    <meta name="description" content="Contact Gyan Shala for inquiries, partnerships, or support.">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="/js/main.js" defer></script>
    <script type="module" src="/js/pages/contact-page.js" defer></script>
    <style>
      .contact-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 40px;
        margin-top: 40px;
      }
      @media (max-width: 768px) {
        .contact-container {
          grid-template-columns: 1fr;
        }
      }
      .contact-info {
        background: rgba(255, 255, 255, 0.8);
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      }
      .contact-info h3 { color: #1a237e; margin-bottom: 20px; }
      .contact-info p { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
      .contact-form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .contact-form input, .contact-form textarea {
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        width: 100%;
      }
      #map-container {
        width: 100%;
        height: 300px;
        margin-top: 30px;
        border-radius: 12px;
        overflow: hidden;
      }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <section class="contact" style="padding-top: 120px; min-height: 80vh; padding-bottom: 80px;">
        <div class="container">
            <div class="text-center">
                <span class="section-badge">Get in Touch</span>
                <h2 class="section-title">Contact Us</h2>
            </div>
            
            <div class="contact-container">
                <div>
                    <form class="contact-form" id="contact-form">
                        <input type="text" id="name" placeholder="Your Name" required>
                        <input type="email" id="email" placeholder="Your Email" required>
                        <input type="tel" id="phone" placeholder="Your Phone Number" required>
                        <textarea id="message" rows="5" placeholder="Your Message" required></textarea>
                        <button type="submit" class="btn-primary">Send Message</button>
                    </form>
                    <div id="form-message" style="margin-top: 15px; font-weight: bold;"></div>
                </div>
                
                <div class="contact-info">
                    <h3>Head Office</h3>
                    <p>📍 101 Education Hub, Main City Center, India</p>
                    <p>📞 +91-9876543210</p>
                    <p>✉️ contact@gyanshala.org</p>
                    <p>🕒 Mon - Sat: 9:00 AM - 6:00 PM</p>
                    
                    <div class="social-links" style="margin-top: 20px;">
                        <a href="#">📱</a>
                        <a href="#">🌐</a>
                        <a href="#">📷</a>
                        <a href="#">🐦</a>
                    </div>

                    <div id="map-container"></div>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
</body>
</html>
