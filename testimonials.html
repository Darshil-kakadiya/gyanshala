<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success Stories | Gyan Shala Smart Education Platform</title>
    <meta name="description" content="Read inspiring success stories from our students, parents, and teachers.">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="/js/main.js" defer></script>
    <script type="module" src="/js/pages/testimonials-page.js" defer></script>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <section class="stories" style="padding-top: 120px; min-height: 80vh;">
        <div class="container text-center">
            <span class="section-badge">Impact</span>
            <h2 class="section-title">Success Stories</h2>
            <div class="stories-grid" id="testimonials-container">
                <!-- Testimonials will be rendered here dynamically -->
            </div>
        </div>
    </section>

    <section class="share-story-section" style="padding: 40px 0; background: var(--bg-alt);">
        <div class="container">
            <div class="card" style="max-width: 600px; margin: 0 auto; text-align: left; padding: 2rem;">
                <h3 style="margin-bottom: 1rem; text-align: center;">Share Your Experience</h3>
                <form id="share-story-form">
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label for="story-name">Name</label>
                        <input type="text" id="story-name" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px;">
                    </div>
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label for="story-role">Role</label>
                        <select id="story-role" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px;">
                            <option value="">Select Role</option>
                            <option value="Student">Student</option>
                            <option value="Parent">Parent</option>
                            <option value="Teacher">Teacher</option>
                            <option value="Volunteer">Volunteer</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label for="story-image">Photo URL (Optional)</label>
                        <div style="display: flex; gap: 8px;">
                            <input type="url" id="story-image" placeholder="https://example.com/photo.jpg" style="flex: 1; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px;">
                            <button type="button" onclick="document.getElementById('story-file-upload').click()" style="padding: 0 1rem; border: 1px solid var(--border); background: var(--surface); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.25rem;" title="Upload from file manager">+</button>
                            <input type="file" id="story-file-upload" accept="image/*,video/*" style="display: none;" onchange="if(this.files[0]) document.getElementById('story-image').value = URL.createObjectURL(this.files[0])">
                        </div>
                    </div>
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label for="story-text">Your Story</label>
                        <textarea id="story-text" rows="4" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; resize: vertical;"></textarea>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Submit Story</button>
                </form>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
</body>
</html>
