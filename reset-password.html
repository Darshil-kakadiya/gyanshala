<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - Gyan Shala</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-centered">
    <div class="auth-card">
        <div class="auth-header">
            <a href="index.html" class="auth-logo">
                <span class="logo-icon">📚</span>
                Gyan Shala
            </a>
            <h2>Set New Password</h2>
            <p>Please enter your new password below.</p>
        </div>
        
        <form id="reset-password-form" class="auth-form">
            <div class="form-group">
                <label for="password" class="form-label">New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="Enter new password" required minlength="8">
                    <button type="button" class="password-toggle">Show</button>
                </div>
                <div id="password-strength" class="password-strength">
                    <div class="strength-bar bar-1"></div>
                    <div class="strength-bar bar-2"></div>
                    <div class="strength-bar bar-3"></div>
                </div>
                <span id="strength-text" class="strength-text"></span>
            </div>
            
            <div class="form-group">
                <label for="confirm_password" class="form-label">Confirm New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm_password" class="form-control" placeholder="Confirm new password" required minlength="8">
                    <button type="button" class="password-toggle">Show</button>
                </div>
            </div>
            
            <button type="submit" class="btn-auth" style="margin-top: 16px;">
                <span class="spinner"></span>
                <span class="btn-text">Update Password</span>
            </button>
        </form>
    </div>
    
    <script type="module" src="auth.js"></script>
</body>
</html>
