<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Gyan Shala</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-centered">
    <div class="auth-card">
        <div class="auth-header">
            <a href="index.html" class="auth-logo">
                <span class="logo-icon">📚</span>
                Gyan Shala
            </a>
            <h2>Reset Password</h2>
            <p>Enter your email address to receive a password reset link.</p>
        </div>
        
        <div id="success-message" class="message-box success">
            We've sent a password reset link to your email. Please check your inbox.
        </div>
        
        <form id="forgot-password-form" class="auth-form">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
            </div>
            
            <button type="submit" class="btn-auth" style="margin-top: 16px;">
                <span class="spinner"></span>
                <span class="btn-text">Send Reset Link</span>
            </button>
            
            <div class="auth-divider"></div>
            
            <p class="text-center" style="font-size: 0.875rem;">
                Remember your password? <a href="login.html" class="auth-link">Back to Sign In</a>
            </p>
        </form>
    </div>
    
    <script src="auth.js"></script>
</body>
</html>
